<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<style>

body{
font-family:Arial;
background:#eee;
padding:20px;
}

.container{
background:white;
border:1px solid #ccc;
padding:15px;
border-radius:5px;
}

.header{
font-weight:bold;
margin-bottom:15px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:8px;
font-size:13px;
}

th{
background:#f7f7f7;
text-align:left;
}

.status{
padding:3px 6px;
color:white;
border-radius:4px;
font-size:11px;
}

.banned{background:#d9534f;}
.pending{background:#f0ad4e;}
.active{background:#5cb85c;}

.btn{
padding:3px 6px;
border:none;
color:white;
font-size:11px;
margin-right:2px;
border-radius:3px;
cursor:pointer;
}

.view{background:#5cb85c;}
.edit{background:#5bc0de;}
.delete{background:#d9534f;}

.footer{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.pagebtn{
padding:4px 8px;
border:1px solid #ccc;
cursor:pointer;
background:white;
}

.activepage{
background:#ddd;
}

</style>
</head>
<body>

function loadTable(){

let tbody=document.getElementById("tableBody");
tbody.innerHTML="";

let start=(currentPage-1)*perPage;
let end=start+perPage;

for(let i=start;i<end;i++){

let s=data[i][3];

tbody.innerHTML+=`
<tr>
<td>${data[i][0]}</td>
<td>${data[i][1]}</td>
<td>${data[i][2]}</td>
<td><span class="status ${s}">${s}</span></td>
<td>
<button class="btn view">View</button>
<button class="btn edit">Edit</button>
<button class="btn delete">Delete</button>
</td>
</tr>
`;

}

document.getElementById("showingText").innerText=
"Showing "+(start+1)+" to "+(end)+" of 40 entries";

}

function nextPage(){
if(currentPage<4){
currentPage++;
loadTable();
}
}

function prevPage(){
if(currentPage>1){
currentPage--;
loadTable();
}
}

function goPage(p){
currentPage=p;
loadTable();
}

loadTable();

</script>
